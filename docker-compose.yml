services:
  success-day-web:
    build:
      context: ./apps/web
    container_name: success-day-web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/success-day.db
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=change-me
      - KEYCLOAK_ISSUER=http://localhost:8080/realms/success-day
      - KEYCLOAK_INTERNAL_ISSUER=http://keycloak:8080/realms/success-day
      - KEYCLOAK_CLIENT_ID=success-day-web
      - KEYCLOAK_CLIENT_SECRET=success-day-secret
      - SCIM_BEARER_TOKEN=dev-scim-token
    volumes:
      - success_day_data:/app/data
      - ./samples:/app/samples:ro
    depends_on:
      - keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: success-day-keycloak
    command:
      - start-dev
      - --import-realm
      - --hostname=http://localhost:8080
      - --hostname-backchannel-dynamic=true
      - --hostname-strict=false
    ports:
      - "8080:8080"
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      - keycloak-db

  keycloak-db:
    image: postgres:16
    container_name: success-day-keycloak-db
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
    volumes:
      - success_day_keycloak_db:/var/lib/postgresql/data

volumes:
  success_day_data:
  success_day_keycloak_db:
